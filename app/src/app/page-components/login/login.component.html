<div class="card shadow-sm m-3">
    <div class="card-header py-2">
        <h5 class="mb-0">Login</h5>
        <small class="text-muted">Login to your account</small>
    </div>

    <div class="card-body p-3">

        <form [formGroup]="loginForm" (ngSubmit)="OnSubmit()" autocomplete="off">

            <div class="row bg-dark rounded px-3 pb-3 m-0">

                <div class="col-12 col-md-6 mt-3 p-0 pe-md-2">
                    <label class="form-label">Email<span class="text-danger">*</span></label>
                    <input type="email" class="form-control" formControlName="email" placeholder="Enter your email"
                        autocomplete="off">
                </div>

                <div class="col-12 col-md-6 mt-3 p-0 ps-md-2">
                    <label class="form-label">Password<span class="text-danger">*</span></label>
                    <input type="password" class="form-control" formControlName="password" placeholder="Enter password"
                        autocomplete="new-password">
                </div>

                <div class="col-12 mt-4 p-0">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                            (click)="OnReset()">Reset</button>
                        <button type="submit" class="btn btn-sm btn-primary">Login</button>
                    </div>
                </div>

            </div>

        </form>

    </div>


</div>
