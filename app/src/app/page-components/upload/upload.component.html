<div class="upload-container">
    <h2>Chunked File Upload</h2>

    <div class="file-zone">
        <input type="file" id="fileInput" (change)="OnFileSelected($event)"
            [disabled]="uploadService.IsUploading$ | async" />
        <label for="fileInput" class="file-label">
            {{ SelectedFile ? SelectedFile.name : 'Choose any file...' }}
        </label>
    </div>

    <div *ngIf="SelectedFile" class="actions">
        <p>File Size: {{ (SelectedFile.size / 1024 / 1024) | number:'1.2-2' }} MB</p>
        <button (click)="UploadFile()" [disabled]="uploadService.IsUploading$ | async">
            Start Upload
        </button>
    </div>

    <div *ngIf="(uploadService.IsUploading$ | async) || MatProgressBar" class="progress-wrapper">
        <div class="progress-bar" [style.width.%]="uploadService.UploadProgress$ | async"></div>
        <span class="progress-text">{{ uploadService.UploadProgress$ | async }}%</span>
    </div>
</div>
